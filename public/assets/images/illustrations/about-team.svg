<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img">
  <defs>
    <filter id="tShadowLg" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#613e18" flood-opacity="0.16"/>
    </filter>
    <filter id="tShadowSm" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#613e18" flood-opacity="0.18"/>
    </filter>
    <path id="tSpark" d="M0,-9 C1.6,-2.2 2.2,-1.6 9,0 C2.2,1.6 1.6,2.2 0,9 C-1.6,2.2 -2.2,1.6 -9,0 C-2.2,-1.6 -1.6,-2.2 0,-9 Z"/>
    <clipPath id="tClipA"><circle cx="0" cy="0" r="52"/></clipPath>
    <clipPath id="tClipB"><circle cx="0" cy="0" r="52"/></clipPath>
    <clipPath id="tClipC"><circle cx="0" cy="0" r="52"/></clipPath>
  </defs>

  <!-- backdrop -->
  <rect width="960" height="720" fill="#fbf7ee"/>
  <ellipse cx="480" cy="380" rx="400" ry="300" fill="#f5e9cc" opacity="0.5"/>
  <circle cx="856" cy="628" r="100" fill="none" stroke="#ecd396" stroke-width="2"/>
  <circle cx="856" cy="628" r="72" fill="none" stroke="#ecd396" stroke-width="2" opacity="0.5"/>
  <g fill="#ecd396" transform="translate(76,86)">
    <circle r="3.2"/><circle cx="24" r="3.2"/><circle cx="48" r="3.2"/><circle cx="72" r="3.2"/>
    <circle cy="24" r="3.2"/><circle cx="24" cy="24" r="3.2"/><circle cx="48" cy="24" r="3.2"/><circle cx="72" cy="24" r="3.2"/>
    <circle cy="48" r="3.2"/><circle cx="24" cy="48" r="3.2"/><circle cx="48" cy="48" r="3.2"/><circle cx="72" cy="48" r="3.2"/>
    <circle cy="72" r="3.2"/><circle cx="24" cy="72" r="3.2"/><circle cx="48" cy="72" r="3.2"/><circle cx="72" cy="72" r="3.2"/>
  </g>
  <g fill="#ecd396" transform="translate(620,84)">
    <circle r="3.2"/><circle cx="24" r="3.2"/><circle cx="48" r="3.2"/><circle cx="72" r="3.2"/>
    <circle cy="24" r="3.2"/><circle cx="24" cy="24" r="3.2"/><circle cx="48" cy="24" r="3.2"/><circle cx="72" cy="24" r="3.2"/>
  </g>

  <!-- dashed connectors with nodes -->
  <path d="M248,216 C296,240 314,250 344,264" fill="none" stroke="#e0b85c" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 9"/>
  <path d="M722,278 C688,290 662,298 632,306" fill="none" stroke="#e0b85c" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 9"/>
  <path d="M480,492 L480,528" fill="none" stroke="#e0b85c" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="1 9"/>
  <circle cx="296" cy="240" r="5" fill="#ffffff" stroke="#cf9026" stroke-width="3"/>
  <circle cx="677" cy="293" r="5" fill="#ffffff" stroke="#cf9026" stroke-width="3"/>
  <circle cx="480" cy="510" r="5" fill="#ffffff" stroke="#cf9026" stroke-width="3"/>

  <!-- hub card -->
  <g filter="url(#tShadowLg)">
    <rect x="340" y="250" width="280" height="230" rx="26" fill="#ffffff" stroke="#f5e9cc" stroke-width="1.5"/>
  </g>
  <rect x="452" y="282" width="56" height="56" rx="16" fill="#cf9026"/>
  <path d="M468,310 l8,8 17,-18" fill="none" stroke="#ffffff" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="415" y="360" width="130" height="13" rx="6.5" fill="#23292b"/>
  <rect x="435" y="383" width="90" height="8" rx="4" fill="#cdd5d1"/>
  <rect x="422" y="414" width="116" height="34" rx="17" fill="#cf9026"/>
  <rect x="452" y="427.5" width="56" height="7" rx="3.5" fill="#ffffff"/>

  <!-- medallion A: consultant with bun -->
  <g transform="translate(190,168)">
    <g filter="url(#tShadowSm)">
      <circle r="62" fill="#ffffff" stroke="#f5e9cc" stroke-width="1.5"/>
    </g>
    <circle r="52" fill="#f5e9cc"/>
    <g clip-path="url(#tClipA)">
      <circle cx="0" cy="-38" r="9.5" fill="#23292b"/>
      <ellipse cx="0" cy="-16" rx="18" ry="17" fill="#23292b"/>
      <rect x="-19" y="-22" width="7" height="30" rx="3.5" fill="#23292b"/>
      <rect x="12" y="-22" width="7" height="30" rx="3.5" fill="#23292b"/>
      <rect x="-7" y="0" width="14" height="16" rx="4" fill="#e0b85c"/>
      <ellipse cx="0" cy="-10" rx="13.5" ry="14.5" fill="#e0b85c"/>
      <rect x="-36" y="14" width="72" height="46" rx="20" fill="#cf9026"/>
      <path d="M-8,14 L0,26 L8,14 Z" fill="#e0b85c"/>
    </g>
    <circle cx="43" cy="43" r="9" fill="#cf9026" stroke="#ffffff" stroke-width="3.5"/>
  </g>

  <!-- medallion B: consultant with glasses -->
  <g transform="translate(782,236)">
    <g filter="url(#tShadowSm)">
      <circle r="62" fill="#ffffff" stroke="#f5e9cc" stroke-width="1.5"/>
    </g>
    <circle r="52" fill="#ecd396"/>
    <g clip-path="url(#tClipB)">
      <rect x="-7" y="0" width="14" height="16" rx="4" fill="#e0b85c"/>
      <ellipse cx="0" cy="-10" rx="14" ry="15" fill="#e0b85c"/>
      <path d="M-14.5,-16 C-14.5,-28 -8,-33 0,-33 C8,-33 14.5,-28 14.5,-16 C9,-23 -9,-23 -14.5,-16 Z" fill="#121716"/>
      <circle cx="-7" cy="-9" r="6.5" fill="none" stroke="#121716" stroke-width="2"/>
      <circle cx="7" cy="-9" r="6.5" fill="none" stroke="#121716" stroke-width="2"/>
      <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#121716" stroke-width="2"/>
      <rect x="-36" y="14" width="72" height="46" rx="20" fill="#353e3a"/>
    </g>
    <circle cx="43" cy="43" r="9" fill="#cf9026" stroke="#ffffff" stroke-width="3.5"/>
  </g>

  <!-- medallion C: consultant with cap -->
  <g transform="translate(480,600)">
    <g filter="url(#tShadowSm)">
      <circle r="62" fill="#ffffff" stroke="#f5e9cc" stroke-width="1.5"/>
    </g>
    <circle r="52" fill="#e6eae8"/>
    <g clip-path="url(#tClipC)">
      <rect x="-7" y="2" width="14" height="16" rx="4" fill="#e0b85c"/>
      <ellipse cx="0" cy="-7" rx="14" ry="14.5" fill="#e0b85c"/>
      <path d="M-15,-18 A15,13 0 0 1 15,-18 Z" fill="#8f5c18"/>
      <rect x="-21" y="-21" width="42" height="7" rx="3.5" fill="#734a18"/>
      <rect x="-36" y="16" width="72" height="46" rx="20" fill="#b3761c"/>
    </g>
    <circle cx="43" cy="43" r="9" fill="#cf9026" stroke="#ffffff" stroke-width="3.5"/>
  </g>

  <!-- chat bubbles -->
  <g transform="translate(802,352)">
    <g filter="url(#tShadowSm)">
      <path d="M16,0 h64 a16,16 0 0 1 16,16 v16 a16,16 0 0 1 -16,16 h-52 l-14,12 2,-12 a16,16 0 0 1 -16,-16 v-16 a16,16 0 0 1 16,-16 Z" fill="#ffffff" stroke="#f5e9cc" stroke-width="1.5"/>
    </g>
    <circle cx="30" cy="24" r="5" fill="#cf9026"/>
    <circle cx="48" cy="24" r="5" fill="#e0b85c"/>
    <circle cx="66" cy="24" r="5" fill="#ecd396"/>
  </g>
  <g transform="translate(586,586)">
    <g filter="url(#tShadowSm)">
      <path d="M16,0 h56 a16,16 0 0 1 16,16 v14 a16,16 0 0 1 -16,16 h-41 l-14,12 2,-12 a16,16 0 0 1 -15,-16 v-14 a16,16 0 0 1 16,-16 Z" fill="#ffffff" stroke="#f5e9cc" stroke-width="1.5"/>
    </g>
    <path d="M32,23 l7,7 16,-17" fill="none" stroke="#cf9026" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- sparkles -->
  <use href="#tSpark" transform="translate(566,116)" fill="#e5a63f"/>
  <use href="#tSpark" transform="translate(902,486) scale(0.75)" fill="#e0b85c"/>
  <use href="#tSpark" transform="translate(84,306) scale(0.8)" fill="#e0b85c"/>
</svg>
