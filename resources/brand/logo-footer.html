<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#ffffff;        /* emblem + title, near-black (matches favicon mark) */
    --accent:#34a157;     /* accent square/dot */
    --sub:#57b97a;        /* subtitle text */
  }
  html,body{margin:0;padding:0;background:transparent;}
  #logo{display:inline-flex;align-items:center;gap:24px;padding:28px 34px;font-family:'Poppins',sans-serif;}
  /* Emblem uses the exact geometry of the site favicon (public/favicon.svg) */
  #logo svg{height:150px;width:auto;display:block;}
  .wm{display:flex;flex-direction:column;line-height:1;}
  .title{font-weight:700;font-size:82px;letter-spacing:-1.5px;color:var(--ink);}
  .sub{font-weight:600;font-size:50px;letter-spacing:.2px;color:var(--sub);line-height:1.07;margin-top:9px;}
</style>
</head>
<body>
  <div id="logo">
    <svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <rect x="105" y="10" width="60" height="76" fill="var(--accent)"/>
      <rect x="200" y="0" width="68" height="200" fill="var(--ink)"/>
      <path d="M0 95 H80 V220 H275 V296 H70 Q0 296 0 226 Z" fill="var(--ink)"/>
    </svg>
    <div class="wm">
      <div class="title">Smart Val</div>
      <div class="sub">Redovisning<br>Sverige AB</div>
    </div>
  </div>
</body>
</html>
